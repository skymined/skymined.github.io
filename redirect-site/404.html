<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Page not found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5efe6;
        color: #1d2a36;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      main {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(29, 42, 54, 0.12);
        background: rgba(255, 252, 246, 0.9);
        text-align: center;
        box-shadow: 0 24px 60px rgba(29, 42, 54, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.2rem);
      }

      p {
        margin: 0;
        color: #5f6d78;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .home {
        background: #124e66;
        color: #fffdf8;
      }

      .blog {
        border: 1px solid rgba(29, 42, 54, 0.12);
        color: #1d2a36;
        background: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>요청한 페이지를 찾지 못했습니다. 루트 소개 페이지로 돌아가거나 블로그에서 다시 찾아보세요.</p>
      <div class="actions">
        <a class="home" href="https://skymined.github.io/">홈으로</a>
        <a class="blog" href="https://skymined.github.io/blog/">블로그로</a>
      </div>
    </main>
  </body>
</html>
